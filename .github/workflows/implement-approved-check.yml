name: Implement Approved CA Check

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  trigger-implementation:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && 
       github.event.label.name == 'approved-for-implementation' &&
       contains(github.event.issue.labels.*.name, 'conditional-access')) ||
      (github.event_name == 'issue_comment' && 
       contains(github.event.comment.body, '@github-copilot implement this check') &&
       contains(github.event.issue.labels.*.name, 'conditional-access'))
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract issue details
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            
            const featureName = issueTitle
              .replace(/🔔/g, '')
              .replace(/New Conditional Access Feature Detected/i, '')
              .replace(/[-:]/g, '')
              .trim()
              .toLowerCase()
              .replace(/\s+/g, '-');
            
            core.setOutput('issue_number', issueNumber);
            core.setOutput('feature_name', featureName);
            core.setOutput('issue_title', issueTitle);
            
            return { issueNumber, featureName, issueTitle };

      - name: Create implementation task comment
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const featureName = '${{ steps.extract.outputs.feature_name }}';
            
            const commentBody = [
              '## 🤖 GitHub Copilot Implementation Started',
              '',
              `**Branch**: \`feature/ca-check-${featureName}\``,
              '',
              'The GitHub Copilot coding agent will now:',
              '1. ✅ Create a new branch',
              '2. 📝 Implement the analyzer check in `src/lib/analyzer.ts`',
              '3. 🎨 Add category metadata to `src/components/findings-list.tsx`',
              '4. 📚 Update `CHANGELOG.md`',
              '5. 🔄 Open a Pull Request for review',
              '',
              '**Estimated time**: 2-5 minutes',
              '',
              'You\'ll be notified when the PR is ready for review.',
              '',
              '---',
              '',
              '**Implementation Context**:',
              `- Issue: #${issueNumber}`,
              `- Feature: ${featureName}`,
              `- Triggered by: @${context.actor}`
            ].join('\n');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody
            });

      - name: Prepare implementation prompt
        id: prompt
        run: |
          ISSUE_NUM="${{ steps.extract.outputs.issue_number }}"
          FEATURE_NAME="${{ steps.extract.outputs.feature_name }}"
          
          cat > implementation-prompt.md << 'PROMPT_EOF'
          # Task: Implement Conditional Access Analyzer Check
          
          ## Context
          A new Conditional Access feature has been announced and needs to be added to the CA Policy Analyzer.
          
          **Issue**: #${{ steps.extract.outputs.issue_number }}
          **Feature**: ${{ steps.extract.outputs.feature_name }}
          
          ## Requirements
          
          Review the linked issue above and implement a new analyzer check following the existing patterns in the codebase.
          
          ### Implementation Steps
          
          1. **Add check function to `src/lib/analyzer.ts`**:
             - Follow the pattern of existing checks (e.g., `checkCredentialRegistrationConstraints`, `checkPrivilegedRoleExclusions`)
             - Include JSDoc comments with reference to the MS Learn announcement
             - Use appropriate severity levels (critical/high/medium/low/info)
             - Provide detailed description and actionable recommendations
             - Return `Finding[]` array
          
          2. **Integrate into analyzer pipeline**:
             - Add the new check to the `analyzeAllPolicies()` function call chain (around line 151)
             - Follow the pattern: `...checkYourNewFunction(policy, context)`
          
          3. **Add UI category metadata in `src/components/findings-list.tsx`**:
             - Add entry to `CATEGORY_META` object (around line 30-50)
             - Choose appropriate icon: `ShieldAlert`, `AlertTriangle`, `Info`, etc.
             - Choose appropriate color: `text-red-400`, `text-orange-400`, `text-blue-400`, etc.
          
          4. **Update CHANGELOG.md**:
             - Add new entry under `## [Unreleased]` section
             - Use `### Added` subsection
             - Include feature name, description, severity, and reference link
             - Increment version number appropriately (patch/minor/major)
          
          5. **Test compilation**:
             - Ensure TypeScript compiles without errors
             - Follow existing code style and patterns
          
          ### Code Patterns to Follow
          
          ```typescript
          // Check function template
          function checkYourFeatureName(
            policy: ConditionalAccessPolicy,
            context: TenantContext
          ): Finding[] {
            const findings: Finding[] = [];
            
            if (policy.state === "disabled") return findings; // if disabled policies don't matter
            
            // Your check logic
            
            findings.push({
              id: nextFindingId(),
              policyId: policy.id,
              policyName: policy.displayName,
              severity: "high", // or critical/medium/low/info
              category: "Your Category Name",
              title: "Short descriptive title",
              description: "Detailed explanation with context",
              recommendation: "Clear remediation steps",
            });
            
            return findings;
          }
          ```
          
          ### Important Notes
          
          - Review the issue details carefully to understand the feature's impact
          - Match the existing code style (2-space indentation, TypeScript strict mode)
          - Include references to Microsoft documentation in comments
          - Use descriptive variable names and clear logic
          - Don't modify unrelated code
          
          ## Acceptance Criteria
          
          - [ ] New check function added to analyzer.ts
          - [ ] Check integrated into analyzeAllPolicies call chain
          - [ ] Category metadata added to findings-list.tsx
          - [ ] CHANGELOG.md updated with new version entry
          - [ ] TypeScript compiles without errors
          - [ ] Code follows existing patterns and style
          
          ---
          
          **Reference Issue**: #${{ steps.extract.outputs.issue_number }}
          PROMPT_EOF

      - name: Trigger GitHub Copilot coding agent
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const featureName = '${{ steps.extract.outputs.feature_name }}';
            
            const prompt = fs.readFileSync('implementation-prompt.md', 'utf8');
            
            const commentBody = [
              prompt,
              '',
              `#github-copilot implement-ca-check-${featureName}`
            ].join('\n');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['implementation-in-progress']
            });
